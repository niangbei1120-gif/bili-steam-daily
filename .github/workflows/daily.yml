name: B站 Steam 热点日报

on:
  schedule:
   # 每天北京时间约 08:00~10:00（UTC 0:00，预留积压缓冲）
  - cron: "0 0 * * *"
  workflow_dispatch:   # 允许手动触发

jobs:
  run:
    runs-on: ubuntu-latest

    # 需要写权限才能推送到 gh-pages 分支
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 写入 B站 Cookie 到文件
        run: |
          echo "${{ secrets.BILI_COOKIE }}" > bili_cookie.txt

      - name: 运行脚本（生成日报 + 推送飞书）
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_ADMIN_WEBHOOK: ${{ secrets.FEISHU_ADMIN_WEBHOOK }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python b站游戏热点推送.py

      - name: 部署 HTML 日报到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report       # 脚本输出到这个目录
          destination_dir: report     # 部署到 gh-pages 的 /report/ 子目录
          keep_files: true            # 保留历史日报，不覆盖旧文件
